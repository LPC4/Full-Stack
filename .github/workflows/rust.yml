name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

env:
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings

jobs:
  check-and-test:
    name: Lint, Check, and Test
    runs-on: self-hosted

    # REQUIRED: Gives the runner permission to push code back to your branch
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Ensures the checkout uses the token with write permissions
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      # 1. Format the code (removed the --check flag so it actually fixes it)
      - name: Format code
        run: cargo fmt --all

      # 2. Commit and push only if changes were made
      - name: Commit and Push formatting fixes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Fix formatting (automated)"
            git push
          else
            echo "No formatting changes detected."
          fi

      - name: Clippy
        run: cargo clippy --all-targets --all-features

      - name: Check WASM target
        run: cargo check --all-features --lib --target wasm32-unknown-unknown

      - name: Test
        run: cargo test --lib