name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  check-and-test:
    name: Lint, Check, and Test
    runs-on: self-hosted

    # Gives the runner permission to push code
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format code
        run: cargo fmt --all

      - name: Auto-fix Clippy warnings
        run: cargo clippy --fix --allow-dirty --allow-no-vcs

      - name: Commit and Push formatting fixes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Fix formatting and clippy lints (automated)"
            git push
          else
            echo "No formatting changes detected."
          fi

      - name: Clippy (Check only)
        run: cargo clippy --all-targets --all-features

      - name: Check WASM target
        run: cargo check --all-features --lib --target wasm32-unknown-unknown

      - name: Test
        run: cargo test --lib