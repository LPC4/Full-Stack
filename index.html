<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <title>Full-Stack</title>
    <meta name="description" content="A custom programming language and compiler toolchain.">

    <link data-trunk rel="rust" data-wasm-opt="2" />
    <base data-trunk-public-url />

    <link data-trunk rel="icon" type="image/png" href="assets/icon/icon.png">

    <link data-trunk rel="copy-file" href="assets/sw.js"/>
    <link data-trunk rel="copy-file" href="assets/manifest.json"/>

    <link data-trunk rel="copy-dir" href="assets/icon/"/>

    <link rel="manifest" href="assets/manifest.json">
    <link rel="apple-touch-icon" href="assets/icon/icon.png">

    <meta name="theme-color" media="(prefers-color-scheme: light)" content="white">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#13141C">

    <style>
        html {
            touch-action: manipulation;
        }

        body {
            /* Using a slightly cleaner, modern light-mode gray */
            background: #F0F2F5;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #1c1c1c;
            }
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .centered {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            color: #8B949E; /* Subtle GitHub-style gray */
            text-align: center;
        }

        /* Modern, minimal spinner */
        .lds-dual-ring {
            display: inline-block;
            width: 32px;
            height: 32px;
        }
        .lds-dual-ring:after {
            content: " ";
            display: block;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 3px solid #8B949E;
            border-color: #8B949E transparent #8B949E transparent;
            animation: lds-dual-ring 1s linear infinite;
        }

        @keyframes lds-dual-ring {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
<canvas id="the_canvas_id"></canvas>

<div class="centered" id="loading_text">
    <div class="lds-dual-ring"></div>
    <p style="margin: 0; font-size: 14px; font-weight: 500; letter-spacing: 0.5px;">
        Initializing Compiler Pipeline...
    </p>
    <noscript>You need JavaScript to run this web application.</noscript>
</div>

<script>
    if ('serviceWorker' in navigator && window.location.hash !== "#dev") {
        window.addEventListener('load', function () {
            navigator.serviceWorker.register('sw.js').then(function (registration) {
                registration.update();
            });
        });
    }
</script>
</body>
</html>
